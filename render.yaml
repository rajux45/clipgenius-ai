# Render Blueprint for ClipGenius AI backend (API + Celery worker + beat) + Postgres + Redis.
# Deploy by visiting https://render.com/deploy and pointing to this repo, or via Render API.
services:
  - type: web
    name: clipgenius-api
    env: docker
    rootDir: backend
    dockerfilePath: backend/Dockerfile
    plan: standard
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: PORT
        value: "8000"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: clipgenius-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: clipgenius-redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false

  - type: worker
    name: clipgenius-worker
    env: docker
    rootDir: backend
    dockerfilePath: backend/Dockerfile
    plan: standard
    autoDeploy: true
    dockerCommand: celery -A app.worker worker --loglevel=info --concurrency=2
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET
        fromService: { type: web, name: clipgenius-api, envVarKey: JWT_SECRET }
      - key: DATABASE_URL
        fromDatabase:
          name: clipgenius-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: clipgenius-redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false

  - type: worker
    name: clipgenius-beat
    env: docker
    rootDir: backend
    dockerfilePath: backend/Dockerfile
    plan: starter
    autoDeploy: true
    dockerCommand: celery -A app.worker beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clipgenius-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: clipgenius-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

  - type: redis
    name: clipgenius-redis
    plan: starter
    ipAllowList: []

databases:
  - name: clipgenius-db
    databaseName: clipgenius
    plan: starter
    postgresMajorVersion: 16
