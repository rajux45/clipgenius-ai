version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clipgenius
      POSTGRES_USER: clipgenius
      POSTGRES_PASSWORD: clipgenius
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clipgenius"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://clipgenius:clipgenius@postgres:5432/clipgenius
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-me
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID:-}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET:-}
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://localhost:8000
    ports: ["8000:8000"]
    volumes:
      - clipgenius_storage:/tmp/clipgenius_storage

  worker:
    build: ./backend
    depends_on: [api, postgres, redis]
    command: celery -A app.worker worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+psycopg2://clipgenius:clipgenius@postgres:5432/clipgenius
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-me
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
    volumes:
      - clipgenius_storage:/tmp/clipgenius_storage

  beat:
    build: ./backend
    depends_on: [api, redis]
    command: celery -A app.worker beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg2://clipgenius:clipgenius@postgres:5432/clipgenius
      REDIS_URL: redis://redis:6379/0

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    volumes:
      - ./frontend:/app

volumes:
  pgdata:
  clipgenius_storage:
